openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: calculator
    description: Calculator operations
  - name: history
    description: Calculation history operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /calculator:
    post:
      operationId: calculate
      tags: [calculator]
      summary: Evaluate a math expression
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatorInput"
      responses:
        "200":
          description: Result of the expression
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculatorResult"
        "400":
          description: Invalid expression
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculatorError"

  /history:
    get:
      operationId: getHistory
      tags: [history]
      summary: Get the last 20 calculations
      description: Returns stored calculations newest-first (max 20 entries, in-memory).
      responses:
        "200":
          description: List of past calculations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"

    delete:
      operationId: clearHistory
      tags: [history]
      summary: Clear all stored calculations
      responses:
        "204":
          description: History cleared successfully — no response body

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    CalculatorInput:
      type: object
      required: [expression]
      properties:
        expression:
          type: string
          minLength: 1
          example: "2+5*8-9/3"

    CalculatorResult:
      type: object
      required: [expression, result]
      properties:
        expression:
          type: string
          example: "2+5*8-9/3"
        result:
          type: number
          example: 39

    CalculatorError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Division by zero"

    HistoryEntry:
      type: object
      required: [id, expression, result, timestamp]
      properties:
        id:
          type: string
          description: Unique entry identifier
        expression:
          type: string
          description: The math expression that was evaluated
          example: "2+5*8-9/3"
        result:
          type: number
          description: The numeric result
          example: 39
        timestamp:
          type: string
          description: ISO 8601 timestamp of when the calculation was made
          example: "2024-01-15T10:30:00.000Z"

    HistoryResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"

